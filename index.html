<!doctype html>
<html lang="it">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<meta name="mobile-web-app-capable" content="yes">

<title>MareNav3D — carta nautica</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">
<style>
  html,body{margin:0;height:100%;background:#06121f;font-family:system-ui,sans-serif;overflow:hidden}
  #map{position:absolute;inset:0}
  #title{position:fixed;z-index:10;top:8px;left:50%;transform:translateX(-50%);
    background:rgba(10,22,38,.94);color:#fff;border:1px solid #1f3650;border-radius:10px;
    padding:6px 13px;font-size:13px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.5)}
  #title small{font-weight:400;color:#8fb0cc;font-size:10px}
  #err{position:fixed;z-index:11;bottom:10px;left:10px;right:10px;max-height:30vh;overflow:auto;
    background:rgba(120,20,30,.92);color:#fff;border-radius:8px;padding:8px 10px;font:12px ui-monospace,monospace;display:none}
  #tools{position:fixed;z-index:10;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;
    background:rgba(10,22,38,.94);border:1px solid #1f3650;border-radius:10px;padding:6px;box-shadow:0 4px 16px rgba(0,0,0,.5)}
  #tools button{padding:7px 11px;border-radius:8px;border:1px solid #1f3650;background:#11243c;color:#dfeaf5;font-size:12.5px;cursor:pointer}
  #tools button.active{background:#1e3a63;border-color:#16e0ff;color:#fff}
  #readout{position:fixed;z-index:10;bottom:54px;left:50%;transform:translateX(-50%);max-width:92vw;text-align:center;
    background:rgba(10,22,38,.94);border:1px solid #1f3650;border-radius:8px;color:#dfeaf5;padding:6px 12px;font-size:12.5px;display:none}
  #readout a{color:#16e0ff;cursor:pointer}
  #nav{position:fixed;z-index:10;top:8px;left:8px;width:150px;display:none;
    background:rgba(10,22,38,.94);border:1px solid #1f3650;border-radius:10px;padding:8px 11px;color:#dfeaf5;font-size:12px;box-shadow:0 4px 16px rgba(0,0,0,.5)}
  #nav h4{margin:0 0 4px;color:#16e0ff;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  #nav .row{display:flex;justify-content:space-between;gap:8px}
  #nav .row span:first-child{color:#8fb0cc}
  #nav .row span:last-child{font-family:ui-monospace,monospace;color:#fff}
  #routesPanel{position:fixed;z-index:12;left:50%;top:46%;transform:translate(-50%,-50%);width:min(86vw,320px);
    background:rgba(10,22,38,.97);border:1px solid #1f3650;border-radius:10px;padding:13px 15px;display:none;box-shadow:0 8px 30px rgba(0,0,0,.6)}
  #routesPanel button{padding:8px 10px;border-radius:7px;border:1px solid #2c416c;background:#11243c;color:#dfeaf5;font-size:12px;cursor:pointer}
  #routesList{max-height:42vh;overflow:auto}
  #inputPanel{position:fixed;z-index:13;left:50%;top:44%;transform:translate(-50%,-50%);width:min(84vw,300px);
    background:rgba(10,22,38,.97);border:1px solid #1f3650;border-radius:10px;padding:13px 15px;display:none;box-shadow:0 8px 30px rgba(0,0,0,.6)}
  #inputPanel .t{font-size:12px;color:#16e0ff;margin-bottom:7px;font-weight:600}
  #inputPanel input{width:100%;padding:9px;border-radius:7px;border:1px solid #2c416c;background:#0e1b30;color:#fff;font-size:15px;margin-bottom:9px}
  #inputPanel .act{display:flex;gap:7px}
  #inputPanel .act button{flex:1;padding:9px;border-radius:7px;border:1px solid #2c416c;background:#11243c;color:#dfeaf5;font-size:12.5px;font-weight:600;cursor:pointer}
  #inputOk{background:#16e0ff!important;color:#062535!important;border-color:#16e0ff!important}
  /* M3: scena 3D */
  #zone{position:absolute;inset:0;display:none;background:#06121f;z-index:1100;touch-action:none}
  #zone canvas{touch-action:none !important}  /* cede il pinch a Plotly: niente movimento "scomposto" su touch */
  #btnBack3d{position:fixed;top:8px;left:8px;display:none;z-index:1200;background:rgba(10,22,38,.94);border:1px solid #1f3650;border-radius:10px;padding:8px 12px;color:#dfeaf5;font-weight:600;font-size:13px;cursor:pointer}
  #zoneZoom{position:fixed;right:8px;bottom:54px;display:none;flex-direction:column;gap:5px;z-index:1200;background:rgba(10,22,38,.94);border:1px solid #1f3650;border-radius:10px;padding:5px}
  #zoneZoom button{width:40px;height:36px;border-radius:8px;border:1px solid #1f3650;background:#11243c;color:#fff;font-size:19px;font-weight:700;cursor:pointer}
  #btnSnap{position:fixed;right:8px;bottom:148px;display:none;z-index:1200;width:40px;height:34px;border-radius:8px;border:1px solid #1f3650;background:rgba(10,22,38,.94);color:#16e0ff;font-size:11px;font-weight:700;cursor:pointer}
  #btnPan{position:fixed;right:8px;bottom:188px;display:none;z-index:1200;width:52px;height:34px;border-radius:8px;border:1px solid #1f3650;background:rgba(10,22,38,.94);color:#dfeaf5;font-size:11px;font-weight:700;cursor:pointer}
  #zReset{position:fixed;right:8px;bottom:228px;display:none;z-index:1200;width:52px;height:34px;border-radius:8px;border:1px solid #1f3650;background:rgba(10,22,38,.94);color:#16e0ff;font-size:11px;font-weight:700;cursor:pointer}
  #btnDetail{position:fixed;right:8px;bottom:268px;display:none;z-index:1200;width:62px;height:34px;border-radius:8px;border:1px solid #16e0ff;background:rgba(16,40,64,.94);color:#8dff3a;font-size:10.5px;font-weight:700;cursor:pointer}
  #btnPan.active{background:#1e3a63;border-color:#16e0ff;color:#fff}
  #nav3d{position:fixed;left:8px;top:50%;transform:translateY(-50%);display:none;z-index:1200;grid-template-columns:repeat(3,34px);grid-template-rows:repeat(3,34px);gap:3px}
  #nav3d button{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;border:1px solid #1f3650;background:rgba(10,22,38,.9);color:#16e0ff;border-radius:7px;cursor:pointer;padding:0;line-height:1}
  #nav3d button .ar{font-size:9px;line-height:1}
  #nav3d button b{font-size:12px;font-weight:700;line-height:1.1}
  #nav3d button:active{background:#1e3a63}
  #nav3dN{grid-column:2;grid-row:1}#nav3dW{grid-column:1;grid-row:2}#nav3dE{grid-column:3;grid-row:2}#nav3dS{grid-column:2;grid-row:3}
  #planesCtl{position:fixed;top:8px;right:8px;display:none;flex-direction:column;z-index:1200;background:rgba(10,22,38,.94);border:1px solid #1f3650;border-radius:10px;padding:7px 10px;color:#dfeaf5;font-size:11.5px;width:216px;box-shadow:0 4px 16px rgba(0,0,0,.5)}
  #ctlHead{display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;user-select:none}
  #ctlHead b{color:#16e0ff;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  #ctlToggle{background:none;border:none;color:#cfe0f2;font-size:14px;cursor:pointer;padding:0 2px;line-height:1}
  #planesBody{display:flex;flex-direction:column;gap:7px;margin-top:6px}
  .ctlGrp{display:flex;flex-direction:column;gap:4px}
  .ctlGrp+.ctlGrp{border-top:1px solid #1f3650;padding-top:6px}
  .ctlH{color:#8fb0cc;font-size:9px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:1px}
  #planesCtl .ctlGrid{display:grid;grid-template-columns:1fr 1fr;gap:3px 8px}
  #planesCtl label{display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:600}
  #planesCtl .ctlGrid label{font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  #planesCtl .ctlGrid input[type=checkbox]{flex:0 0 auto;margin:0}
  #planesCtl .ctlRow{display:flex;align-items:center;gap:6px;font-weight:600}
  #planesCtl .ctlRow span{color:#8fb0cc}
  #planesCtl .ctlSub{padding-left:6px;font-size:11px;border-left:2px solid #1f3650;margin-left:2px}
  #planesCtl input[type=number]{width:46px;background:#11243c;border:1px solid #1f3650;color:#fff;border-radius:6px;padding:2px 4px;font-size:11px}
  #planesCtl input[type=range]{flex:1;min-width:70px;vertical-align:middle;accent-color:#16e0ff}
  #veVal,#xrayVal,#sunAzVal{color:#8df0ff;font-family:ui-monospace,monospace;min-width:32px;text-align:right}
  #zoneReadout{position:fixed;z-index:1200;bottom:10px;left:50%;transform:translateX(-50%);max-width:92vw;display:none;
    background:rgba(10,22,38,.94);border:1px solid #1f3650;border-radius:10px;padding:7px 13px;color:#dfeaf5;font-size:12.5px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.5)}
  #zoneReadout b{color:#16e0ff;font-family:ui-monospace,monospace;font-size:14px}
  #zoneReadout small{color:#8fb0cc;font-family:ui-monospace,monospace}
  #sectionPanel{position:fixed;z-index:1250;left:8px;bottom:64px;width:min(54vw,380px);display:none;
    background:rgba(10,22,38,.96);border:1px solid #1f3650;border-radius:10px;padding:6px 9px 3px;box-shadow:0 4px 16px rgba(0,0,0,.5)}
  #sectionPanel .sHd{display:flex;justify-content:space-between;align-items:center;gap:8px;color:#8fb0cc;font-size:11px;margin-bottom:2px}
  #sectionPanel .sHd b{color:#16e0ff}
  #sectionInfo{flex:1;text-align:right;font-family:ui-monospace,monospace;color:#8df0ff;font-size:10.5px}
  #sectionClose{background:none;border:none;color:#cfe0f2;font-size:14px;cursor:pointer;padding:0 2px}
  #sectionChart{width:100%;height:120px}
  #statsPanel{position:fixed;z-index:1250;left:8px;top:52px;width:min(58vw,232px);display:none;
    background:rgba(10,22,38,.96);border:1px solid #1f3650;border-radius:10px;padding:8px 11px;color:#dfeaf5;font-size:11.5px;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.5)}
  #statsPanel h4{margin:0 0 5px;color:#16e0ff;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  #statsPanel b{color:#8df0ff;font-family:ui-monospace,monospace}
  #statsPanel .bar{height:6px;border-radius:3px;background:#11243c;margin:2px 0 5px;overflow:hidden}
  #statsPanel .bar>i{display:block;height:100%;background:linear-gradient(90deg,#16e0ff,#2171b5)}
  #loading{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:2000;background:rgba(6,18,31,.85);color:#16e0ff;font-size:15px;flex-direction:column;gap:10px}
</style>
</head>
<body>
<div id="map"></div>
<div id="title">MareNav3D<br><small>carta nautica &middot; fondali 3D</small></div>
<div id="err"></div>
<div id="readout"></div>
<div id="nav">
  <h4>Navigazione</h4>
  <div class="row"><span>Lat</span><span id="nLat">—</span></div>
  <div class="row"><span>Lon</span><span id="nLon">—</span></div>
  <div class="row"><span>Fondale</span><span id="nDep">—</span></div>
  <div class="row"><span>Vel.</span><span id="nSpd">—</span></div>
  <div class="row"><span>Rotta</span><span id="nCog">—</span></div>
  <div class="row"><span>&rarr; WP</span><span id="nWp">—</span></div>
  <div class="row"><span>Bussola</span><span id="nBrg">—</span></div>
  <div class="row"><span>ETA</span><span id="nEta">—</span></div>
</div>
<div id="tools">
  <button id="btnGps">GPS</button>
  <button id="btnDepth" class="active">Profondità</button>
  <button id="btnRuler">Righello</button>
  <button id="btnRoute">Rotta</button>
  <button id="btnRoutes">Rotte</button>
  <button id="btnTrack">Traccia</button>
  <button id="btnCatch">Cattura</button>
  <button id="btn3d">Fondali 3D</button>
</div>
<div id="zone"></div>
<svg id="sectionOverlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;display:none;z-index:1150"></svg>
<div id="zone3dov" style="position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;display:none;z-index:1155"></div>
<button id="btnBack3d">&#8592; Carta</button>
<div id="zoneReadout"></div>
<div id="sectionPanel">
  <div class="sHd"><b>Sezione fondale</b><span id="sectionInfo"></span><button id="sectionClose" title="Chiudi">&#10005;</button></div>
  <div id="sectionChart"></div>
</div>
<div id="statsPanel"></div>
<div id="zoneZoom"><button id="zZoomIn">+</button><button id="zZoomOut">&minus;</button></div>
<button id="btnDetail" title="Carica il dettaglio della zona inquadrata (alta risoluzione)">Dettaglio</button>
<button id="zReset" title="Reset vista (posizione di default)">&#8635; Vista</button>
<button id="btnPan" title="Sposta la vista (pan) invece di ruotare">Sposta</button>
<button id="btnSnap" title="Salva immagine PNG della scena 3D">PNG</button>
<div id="nav3d">
  <button id="nav3dN" title="Carica l'area a Nord"><span class="ar">&#9650;</span><b>N</b></button>
  <button id="nav3dW" title="Carica l'area a Ovest"><span class="ar">&#9664;</span><b>W</b></button>
  <button id="nav3dE" title="Carica l'area a Est"><span class="ar">&#9654;</span><b>E</b></button>
  <button id="nav3dS" title="Carica l'area a Sud"><span class="ar">&#9660;</span><b>S</b></button>
</div>
<div id="planesCtl">
  <div id="ctlHead"><b>Controlli 3D</b><button id="ctlToggle" title="Comprimi/espandi">&#9662;</button></div>
  <div id="planesBody">
    <div class="ctlGrp">
      <div class="ctlH">Vista</div>
      <div class="ctlGrid">
        <label title="Superficie unica topografica con isolinee (stile ROTTA_A_3D) invece delle 2 superfici mare/terra"><input type="checkbox" id="styleRotta"> Topografico</label>
        <label title="Pannelli di sfondo verticali del cubo 3D (assi x/y)"><input type="checkbox" id="wallsOn"> Pareti box</label>
        <label title="Piano di riferimento orizzontale a quota 0"><input type="checkbox" id="seaLevelOn"> Livello mare</label>
        <label title="Luce radente per far risaltare il rilievo (hillshade)"><input type="checkbox" id="shadeOn"> Ombra rilievo</label>
        <label title="Texture di rugosita' STIMATA (frattale) sotto i 115 m EMODnet: solo estetica, NON profondita' reale"><input type="checkbox" id="fractalOn"> Rilievo stimato</label>
      </div>
      <div class="ctlRow ctlSub" id="rowSun" style="display:none"><span>Sole</span><input type="range" id="sunAz" min="0" max="360" step="15" value="300"><b id="sunAzVal">300&deg;</b></div>
      <div class="ctlRow"><span>Rilievo</span><input type="range" id="veSlider" min="1" max="8" step="0.5" value="3"><b id="veVal">3.0×</b></div>
      <div class="ctlRow"><span>Trasp.</span><input type="range" id="xraySlider" min="0" max="100" step="5" value="0"><b id="xrayVal">0%</b></div>
    </div>
    <div class="ctlGrp">
      <div class="ctlH">Strumenti</div>
      <div class="ctlGrid">
        <label title="Barca + ecoscandaglio: tocca il fondale per spostarla"><input type="checkbox" id="boatOn"> Barca</label>
        <label title="La scena segue la tua posizione GPS reale"><input type="checkbox" id="boatGpsOn"> Barca GPS</label>
        <label title="Tocca 2 punti: profilo verticale del fondale tra i due"><input type="checkbox" id="sectionOn"> Sezione</label>
        <label title="Evidenzia scarpate ripide e banchi (euristica)"><input type="checkbox" id="upwellOn"> Upwelling</label>
        <label title="Evidenzia una fascia di profondità scelta"><input type="checkbox" id="isobandOn"> Isobata</label>
        <label title="Area, profondità min/media/max, pendenza, fasce"><input type="checkbox" id="statsOn"> Statistiche</label>
        <label title="Piani di riferimento a profondità regolabile"><input type="checkbox" id="planesOn"> Piani prof.</label>
      </div>
      <div class="ctlRow ctlSub" id="rowIso" style="display:none"><span>fascia</span><input id="isobandFrom" type="number" value="80" min="0" step="10">&ndash;<input id="isobandTo" type="number" value="120" min="0" step="10"> m</div>
      <div class="ctlRow ctlSub" id="rowPlanes" style="display:none"><span>ogni</span><input type="number" id="planesStep" value="500" min="50" step="50"><span>m</span></div>
    </div>
  </div>
</div>
<div id="loading"><div id="loadtxt">Carico&hellip;</div></div>
<div id="routesPanel">
  <div style="font-size:12px;color:#16e0ff;margin-bottom:7px;font-weight:600">Rotte salvate</div>
  <div id="routesList"></div>
  <div style="display:flex;gap:7px;margin-top:9px">
    <button id="rtNew">Nuova</button><button id="rtSave">Salva attuale</button><button id="rtClose">Chiudi</button>
  </div>
</div>
<div id="inputPanel">
  <div class="t" id="inputTitle"></div>
  <input id="inputField" type="text" maxlength="40" autocomplete="off">
  <div class="act"><button id="inputCancel">Annulla</button><button id="inputOk">OK</button></div>
</div>
<script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/pmtiles@4.4.1/dist/pmtiles.js"></script>
<script src="https://unpkg.com/@protomaps/basemaps@5/dist/basemaps.js"></script>
<script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script>
"use strict";
window.MLP = { ready:false, error:null };
function showErr(m){ const e=document.getElementById('err'); e.style.display='block'; e.textContent += m+'\n'; window.MLP.error=(window.MLP.error||'')+m+'\n'; }
window.addEventListener('error', ev=>showErr('JS: '+ev.message));
const $=id=>document.getElementById(id);

// ---- profondita' al tocco: WCS EMODnet + GeoTIFF (stessa logica dell'app Leaflet, motore-agnostica) ----
const NATIVE_RES=0.0010416666666666667;
const DETAIL_CAP=480;   // max celle per lato del fondale 3D (alzato da 360): bilanciamento dettaglio/performance
// densita' ADATTIVA: punta al nativo EMODnet (~0.001°) con cap di performance -> aree piccole molto dettagliate, grandi limitate
function detailCells(spanDeg){ return Math.max(160, Math.min(DETAIL_CAP, Math.round(spanDeg/NATIVE_RES))); }
const WCS_URL='https://ows.emodnet-bathymetry.eu/wcs?service=WCS&version=2.0.1&request=GetCoverage&coverageId=emodnet__mean&format=image/tiff';
function fetchTO(url,ms){ const ctl=new AbortController(); const t=setTimeout(()=>ctl.abort(),ms); return fetch(url,{signal:ctl.signal}).finally(()=>clearTimeout(t)); }
async function fetchTile(latS,latN,lonW,lonE,maxpx){
  const sf=Math.min(maxpx/((lonE-lonW)/NATIVE_RES), maxpx/((latN-latS)/NATIVE_RES),1).toFixed(4);
  const url=WCS_URL+'&subset=Lat('+latS+','+latN+')&subset=Long('+lonW+','+lonE+')&scalefactor='+sf;
  const resp=await fetchTO(url,30000); if(!resp.ok) throw new Error('WCS HTTP '+resp.status);
  const buf=await resp.arrayBuffer();
  const tiff=await GeoTIFF.fromArrayBuffer(buf); const img=await tiff.getImage();
  const data=(await img.readRasters())[0];
  let nd=null; try{ nd=img.getGDALNoData(); }catch(_){ }
  if(nd!=null){ for(let k=0;k<data.length;k++){ if(data[k]===nd) data[k]=NaN; } }
  return {w:img.getWidth(),h:img.getHeight(),data};
}
async function depthAt(lat,lon){
  try{ const t=await fetchTile(lat-0.03,lat+0.03,lon-0.03,lon+0.03,8);
    const v=t.data[Math.floor(t.h/2)*t.w+Math.floor(t.w/2)];
    return (v>-8000&&v<200)?v:null; }catch(e){ return null; }
}

try {
  // 1) registra il protocollo pmtiles
  const protocol = new pmtiles.Protocol();
  maplibregl.addProtocol('pmtiles', protocol.tile);

  // 2) PMTiles locale (stessa origine -> range request OK)
  const PMTILES_URL = 'pmtiles://' + new URL('capri_ostia.pmtiles', location.href).href;

  // 3) stile: base vettoriale Protomaps (terra, strade, localita', porti) in italiano
  const style = {
    version: 8,
    glyphs: 'https://protomaps.github.io/basemaps-assets/fonts/{fontstack}/{range}.pbf',
    sprite: 'https://protomaps.github.io/basemaps-assets/sprites/v4/light',
    sources: {
      protomaps: { type:'vector', url: PMTILES_URL,
        attribution: '&copy; OpenStreetMap &middot; Protomaps' }
    },
    layers: basemaps.layers('protomaps', basemaps.namedFlavor('light'), { lang:'it' })
  };

  const map = new maplibregl.Map({
    container:'map', style:style, center:[12.6,41.2], zoom:7.5, hash:false, attributionControl:true
  });
  map.addControl(new maplibregl.NavigationControl({showCompass:false}), 'top-right');
  map.addControl(new maplibregl.ScaleControl({unit:'nautical'}), 'bottom-left');
  window.MLP.map = map;

  // ---- sistema modalita' strumenti (null = profondita') ----
  let mode=null, rulerPts=[];
  let routePts = (()=>{ try{ return JSON.parse(localStorage.getItem('mnav_route')||'[]'); }catch(e){ return []; } })();
  let track = (()=>{ try{ return JSON.parse(localStorage.getItem('mnav_track')||'[]'); }catch(e){ return []; } })();  // [[lat,lng],...] (compat app)
  let recording=false;

  // ============ M3: scena 3D (riuso Plotly, come l'app Leaflet / ROTTA_A_3D) ============
  async function fetchGridSingle(latS,latN,lonW,lonE){ const px=detailCells(Math.max(lonE-lonW,latN-latS));   // densita' adattiva (era fisso 300)
    const t=await fetchTile(latS,latN,lonW,lonE,px);

  async function fetchGridTiled(latS,latN,lonW,lonE){
    const dlon=lonE-lonW,dlat=latN-latS,res=0.04,cols=Math.min(420,Math.round(dlon/res)),rows=Math.min(420,Math.round(dlat/res));
    const band=new Float32Array(rows*cols).fill(NaN); const TILE=3.0,nLon=Math.ceil(dlon/TILE),nLat=Math.ceil(dlat/TILE),tiles=[],jobs=[];
    for(let a=0;a<nLat;a++)for(let o=0;o<nLon;o++){ const tS=latS+a*dlat/nLat,tN=latS+(a+1)*dlat/nLat,tW=lonW+o*dlon/nLon,tE=lonW+(o+1)*dlon/nLon;
      jobs.push(fetchTile(tS,tN,tW,tE,200).then(t=>tiles.push({tS,tN,tW,tE,w:t.w,h:t.h,data:t.data})).catch(()=>{})); }

        const tj=Math.max(0,Math.min(t.w-1,Math.round((lon-t.tW)/((t.tE-t.tW)/(t.w-1)))));
        const v=t.data[ti*t.w+tj];band[i*cols+j]=(v>-8000&&v<9000)?v:NaN;break; } } } }
    return gridFromRaster(band,cols,rows,{latS,latN,lonW,lonE});
  }
  function gridFromRaster(band,cols,rows,bb){ const lats=[],lons=[],zz=[];
    const dlat=(bb.latN-bb.latS)/(rows-1),dlon=(bb.lonE-bb.lonW)/(cols-1);
    for(let i=0;i<rows;i++)lats.push(+(bb.latN-i*dlat).toFixed(5));
    for(let j=0;j<cols;j++)lons.push(+(bb.lonW+j*dlon).toFixed(5));

  // DEM terra ad alta risoluzione: Terrarium (RGB elevation, AWS Open Data). Zoom ~30 m, cap a 16 tile.
  async function fetchTerrain(latS,latN,lonW,lonE){
    const cLat=(latS+latN)/2, c=Math.cos(cLat*Math.PI/180);
    const merc=la=>(1-Math.log(Math.tan(la*Math.PI/180)+1/Math.cos(la*Math.PI/180))/Math.PI)/2;
    let z=Math.ceil(Math.log2(40075000*c/(256*30))); z=Math.max(8,Math.min(13,z));
    let n,x0,x1,y0,y1,TW,TH;
    for(;z>=8;z--){ n=Math.pow(2,z);
      x0=Math.floor((lonW+180)/360*n); x1=Math.floor((lonE+180)/360*n);
      y0=Math.floor(merc(latN)*n); y1=Math.floor(merc(latS)*n);
      TW=x1-x0+1; TH=y1-y0+1; if(TW*TH<=16) break; }
    const W=TW*256,H=TH*256, cv=document.createElement('canvas'); cv.width=W; cv.height=H;
    const ctx=cv.getContext('2d',{willReadFrequently:true}), jobs=[];
    for(let tx=x0;tx<=x1;tx++)for(let ty=y0;ty<=y1;ty++){
      const u='https://s3.amazonaws.com/elevation-tiles-prod/terrarium/'+z+'/'+tx+'/'+ty+'.png';
      jobs.push(fetch(u).then(r=>r.ok?r.blob():null).then(bl=>bl?createImageBitmap(bl):null).then(bm=>{ if(bm){ ctx.drawImage(bm,(tx-x0)*256,(ty-y0)*256); if(bm.close)bm.close(); } }).catch(()=>{}));
    }
    await Promise.all(jobs);
    let d=null; try{ d=ctx.getImageData(0,0,W,H).data; }catch(e){ d=null; }
    const elevAt=(lat,lon)=>{ if(!d) return null;
      let px=Math.round(((lon+180)/360*n - x0)*256), py=Math.round((merc(lat)*n - y0)*256);
      if(px<0)px=0; if(px>=W)px=W-1; if(py<0)py=0; if(py>=H)py=H-1;
      const i=(py*W+px)*4; return (d[i]*256+d[i+1]+d[i+2]/256)-32768; };
    return {elevAt, zoom:z};
  }
  // griglia densa: terra da Terrarium (quota>0), mare da EMODnet (g)
  function mergeLandSea(latS,latN,lonW,lonE,g,terr){

    const lats=[],lons=[],zz=[], dlat=(latN-latS)/(rows-1), dlon=(lonE-lonW)/(cols-1);
    for(let i=0;i<rows;i++) lats.push(+(latN-i*dlat).toFixed(5));

  // Una cella e' outlier se devia dalla mediana dei suoi 8 vicini oltre ~8x la dimensione cella (pendenza > ~83°):
  // la riporta alla mediana locale. Le scarpate reali (pendenza minore, gradiente continuo) restano intatte.
  function removeCurtains(g){
    const rows=g.rows, cols=g.cols;
    const cellM=Math.max(20, ((g.bb.lonE-g.bb.lonW)/Math.max(1,cols))*111320*Math.cos((g.bb.latS+g.bb.latN)/2*Math.PI/180));
    const THRESH=8*cellM;
    // Opzione 1: scorre TUTTE le celle, PERIMETRO INCLUSO (prima/ultima riga e colonna), con vicini bounds-checked.
    // Le "tende" verticali si formano anche sul bordo del box (faccia della mesh dal bordo ~quota 0 giu' verso il profondo):
    // saltando i bordi restavano. Ora un bordo-outlier viene riportato alla mediana dei suoi vicini disponibili (>=3: angolo=3, bordo=5, interno=8).
    // 3 PASSAGGI: dove due tende si incontrano (angolo) la mediana resta alterata al 1o giro -> i passaggi successivi propagano la pulizia.
    // Sicuro: un pendio reale (gradiente < 8x cella) non supera mai THRESH -> stabile tra i passaggi, mai appiattito.

    const dist=t=>Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY);
    z.addEventListener('touchstart', e=>{ if(e.touches.length===2){ pinching=true; lastDist=dist(e.touches); e.preventDefault(); e.stopPropagation(); } }, {capture:true, passive:false});
    z.addEventListener('touchmove', e=>{ if(pinching && e.touches.length===2){ e.preventDefault(); e.stopPropagation();
        const d=dist(e.touches); if(d>0 && lastDist>0){ let f=lastDist/d; f=Math.max(0.85,Math.min(1.18,f)); zoneZoom(f); } lastDist=d; } }, {capture:true, passive:false});
    z.addEventListener('touchend', e=>{ if(pinching){ e.preventDefault(); e.stopPropagation(); } if(e.touches.length<2) pinching=false; }, {capture:true, passive:false});
    z.addEventListener('touchcancel', ()=>{ pinching=false; }, {capture:true, passive:false});
  })();
  window.MLP.build3D=build3D;
  window.MLP.updateZoneReadout=updateZoneReadout;   // hook per test (simula hover: {points:[{x:lon,y:lat,z:quota,data:{type:'surface'}}]})
  window.MLP.setBoat3d=(lon,lat)=>{ boat3d=(lon==null?null:{lon,lat}); render3DScene(); };   // hook per test barca (Task 4)
  window.MLP.getBoat3d=()=>boat3d;
  window.MLP.removeCurtains=removeCurtains;   // hook per test de-curtain bordi
  window.MLP.setSection=(aLon,aLat,bLon,bLat)=>{ section3d={a:{lon:aLon,lat:aLat},b:{lon:bLon,lat:bLat}}; showSectionProfile(); drawSectionOnMap(); drawSection3dOverlay(); };   // hook test sezione (overlay 3D)

  window.MLP.setMode=setMode; window.MLP.getRuler=()=>rulerPts; window.MLP.getRoute=()=>routePts; window.MLP.gpsOn=()=>watchId!=null;

  // M2.1: profondita' al tocco / M2.2: righello (click -> aggiunge punto)
  map.on('click', async (e)=>{
    const lng=e.lngLat.lng, lat=e.lngLat.lat;
    if(mode==='wp'){ routePts.push({lat,lng}); drawRoute(); persistRoute(); wpReadout(); return; }
    if(mode==='ruler'){ rulerPts.push([lng,lat]); drawRuler(); return; }
    if(mode==='catch'){ askInput('Registra cattura','specie / peso (opzionale)','', note=>{
        catches.push({lat,lng,note:(note||'').slice(0,40),t:Date.now()}); drawCatches(); persistCatches(); readout('Cattura registrata ('+catches.length+')'); }); return; }
    const pop=new maplibregl.Popup({closeButton:true,maxWidth:'220px'}).setLngLat([lng,lat]).setHTML('Leggo il fondale&hellip;').addTo(map);
    const d=await depthAt(lat,lng);
    pop.setHTML(d==null
      ? ('Nessun dato qui<br><small>'+lat.toFixed(4)+', '+lng.toFixed(4)+'</small>')
      : ('<b>'+Math.abs(Math.round(d))+' m</b><br><small>'+lat.toFixed(4)+', '+lng.toFixed(4)+'</small>'));
    window.MLP.lastDepth = d;
  });

  // M1b: batimetria EMODnet (WMS trasparenti: colori profondita' + isobate) + segnalamenti OpenSeaMap,
  // inseriti SOTTO strade/etichette -> il mare prende la batimetria, terra/strade/localita' restano sopra.
  map.on('load', ()=>{
    const wms = layer => 'https://ows.emodnet-bathymetry.eu/wms?service=WMS&request=GetMap&version=1.3.0&layers='+layer+'&styles=&format=image/png&transparent=true&crs=EPSG:3857&width=256&height=256&bbox={bbox-epsg-3857}';
    // baselayer batimetrico EMODnet (rilievo, opaco: mare batimetrico + terra beige) - fondo marino pieno
    map.addSource('emodnet_base',    {type:'raster',tileSize:256,maxzoom:14,tiles:['https://tiles.emodnet-bathymetry.eu/2020/baselayer/web_mercator/{z}/{x}/{y}.png'],attribution:'&copy; EMODnet Bathymetry &middot; quota terra 3D &copy; Terrarium / Tilezen-Joerd (AWS Open Data)'});
    map.addSource('emodnet_color',   {type:'raster',tileSize:256,tiles:[wms('emodnet:mean_multicolour')],attribution:'&copy; EMODnet Bathymetry'});
    map.addSource('emodnet_contours',{type:'raster',tileSize:256,tiles:[wms('emodnet:contours')],attribution:'&copy; EMODnet Bathymetry'});
    map.addSource('seamark',         {type:'raster',tileSize:256,maxzoom:18,tiles:['https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png'],attribution:'&copy; OpenSeaMap'});
    // punto d'inserimento: prima del primo layer strade/transit (cosi' strade+etichette restano sopra)
    let beforeId; for(const l of map.getStyle().layers){ if(/^(roads|transit)/.test(l.id)){ beforeId=l.id; break; } }
    if(!beforeId){ for(const l of map.getStyle().layers){ if(l.type==='symbol'){ beforeId=l.id; break; } } }
    map.addLayer({id:'emodnet_base',    type:'raster',source:'emodnet_base',    paint:{'raster-opacity':1.0,'raster-contrast':0.4,'raster-saturation':0.25,'raster-brightness-max':0.93}},  beforeId); // rilievo - definizione come Leaflet (contrast/saturate/brightness)
    map.addLayer({id:'emodnet_color',   type:'raster',source:'emodnet_color',   paint:{'raster-opacity':0.7,'raster-saturation':0.2}},  beforeId); // colori profondita' piu' vividi
    map.addLayer({id:'emodnet_contours',type:'raster',source:'emodnet_contours',paint:{'raster-opacity':0.9}},  beforeId); // isobate
    map.addLayer({id:'seamark',         type:'raster',source:'seamark',         minzoom:11, paint:{'raster-opacity':1.0}},  beforeId); // segnalamenti (solo da vicino: evita la valanga di richieste a OpenSeaMap a vista larga)
    window.MLP.beforeId = beforeId;
    // FIX layering: il riempimento 'water' di Protomaps (fill opaco, sopra i raster) copriva la
    // batimetria EMODnet DENTRO il bbox del PMTiles -> mare azzurro piatto. Lo rendo trasparente:
    // la batimetria (sotto) emerge su tutto il mare; strade/localita'/etichette restano sopra.
    if(map.getLayer('water')) map.setPaintProperty('water','fill-opacity',0);

    // M1c: griglia coordinate (graticule) in cima, adattiva allo zoom
    map.addSource('grid',     {type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addSource('grid_lbl', {type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addLayer({id:'grid_lines',type:'line',source:'grid',
      paint:{'line-color':'#06324a','line-width':0.7,'line-opacity':0.5}});
    map.addLayer({id:'grid_labels',type:'symbol',source:'grid_lbl',
      layout:{'text-field':['get','label'],'text-font':['Noto Sans Regular'],'text-size':10,
        'text-anchor':['get','anchor'],'text-offset':[0.4,0.3],'text-allow-overlap':true},
      paint:{'text-color':'#06324a','text-halo-color':'#ffffff','text-halo-width':1.3}});
    function gridStep(z){ if(z<=4)return 5; if(z<=5)return 2; if(z<=6)return 1; if(z<=8)return 0.5; if(z<=9)return 0.25; if(z<=10)return 0.1; if(z<=11)return 0.05; if(z<=12)return 0.025; return 0.01; }
    function fmtDeg(v,isLat,z){ const step=gridStep(z),hemi=isLat?(v>=0?'N':'S'):(v>=0?'E':'W'),a=Math.abs(v);
      if(step>=1) return Math.round(a)+'°'+hemi;
      const d=Math.floor(a),m=(a-d)*60,dec=step<0.05?1:0; return d+'°'+m.toFixed(dec)+"'"+hemi; }
    function drawGrid(){ const b=map.getBounds(),z=map.getZoom(),step=gridStep(z);
      const w=b.getWest(),e=b.getEast(),s=b.getSouth(),n=b.getNorth();
      const s0=Math.floor(s/step)*step,n0=Math.ceil(n/step)*step,w0=Math.floor(w/step)*step,e0=Math.ceil(e/step)*step;
      const lines=[],labels=[];
      if((n0-s0)/step<=300 && (e0-w0)/step<=300){
        for(let lat=s0; lat<=n0+1e-9; lat+=step){ lines.push({type:'Feature',geometry:{type:'LineString',coordinates:[[w,lat],[e,lat]]}});
          labels.push({type:'Feature',properties:{label:fmtDeg(lat,true,z),anchor:'left'},geometry:{type:'Point',coordinates:[w,lat]}}); }
        for(let lon=w0; lon<=e0+1e-9; lon+=step){ lines.push({type:'Feature',geometry:{type:'LineString',coordinates:[[lon,s],[lon,n]]}});
          labels.push({type:'Feature',properties:{label:fmtDeg(lon,false,z),anchor:'bottom'},geometry:{type:'Point',coordinates:[lon,s]}}); }
      }
      map.getSource('grid').setData({type:'FeatureCollection',features:lines});
      map.getSource('grid_lbl').setData({type:'FeatureCollection',features:labels});
    }
    map.on('moveend', drawGrid);
    drawGrid();

    // M2.2: righello (sorgenti + layer, in cima)
    map.addSource('ruler_line',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addLayer({id:'ruler_line',type:'line',source:'ruler_line',paint:{'line-color':'#ff3b6b','line-width':2.5,'line-dasharray':[2,1.5]}});
    // punti del righello: maplibregl.Marker draggabili (vedi drawRuler), non layer statici

    // M2.3: rotta / waypoint (sorgenti + layer, in cima) + ridisegno rotta persistita
    map.addSource('route_line',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addLayer({id:'route_line',type:'line',source:'route_line',paint:{'line-color':'#ffd54a','line-width':3}});
    // waypoint: maplibregl.Marker draggabili numerati (vedi drawRoute), non layer statici
    drawRoute();

    // M2.4: cerchio di accuratezza GPS
    map.addSource('gps_acc',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addLayer({id:'gps_acc',type:'fill',source:'gps_acc',paint:{'fill-color':'#39ff7a','fill-opacity':0.12,'fill-outline-color':'#39ff7a'}});

    // M2.5: traccia (cyan) + catture (arancio)
    map.addSource('track',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addLayer({id:'track',type:'line',source:'track',paint:{'line-color':'#16e0ff','line-width':3,'line-opacity':0.85}});
    map.addSource('catches',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addLayer({id:'catches_c',type:'circle',source:'catches',paint:{'circle-radius':6,'circle-color':'#ff8c1a','circle-stroke-color':'#fff','circle-stroke-width':2}});
    map.addLayer({id:'catches_n',type:'symbol',source:'catches',
      layout:{'text-field':['get','note'],'text-font':['Noto Sans Regular'],'text-size':10,'text-offset':[0,1.1]},
      paint:{'text-color':'#fff','text-halo-color':'#7a3d00','text-halo-width':1.2}});
    // Sezione batimetrica: linea A-B + punti A/B sulla cartina 2D (leggero, indipendente dal 3D)
    map.addSource('section_geo',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addLayer({id:'section_line',type:'line',source:'section_geo',filter:['==','$type','LineString'],paint:{'line-color':'#ff5be0','line-width':3,'line-dasharray':[2,1]}});
    map.addLayer({id:'section_pts',type:'circle',source:'section_geo',filter:['==','$type','Point'],paint:{'circle-radius':6,'circle-color':'#ff5be0','circle-stroke-color':'#fff','circle-stroke-width':2}});
    map.addLayer({id:'section_lbl',type:'symbol',source:'section_geo',filter:['==','$type','Point'],
      layout:{'text-field':['get','id'],'text-font':['Noto Sans Regular'],'text-size':14,'text-offset':[0,-1.3],
              'text-allow-overlap':true,'text-ignore-placement':true},
      paint:{'text-color':'#ffffff','text-halo-color':'#a0009a','text-halo-width':1.6}});
    drawTrack(); drawCatches();

    // M3: rettangolo selezione area per i Fondali 3D
    map.addSource('rect3d',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addLayer({id:'rect3d',type:'fill',source:'rect3d',paint:{'fill-color':'#ffd24a','fill-opacity':0.15,'fill-outline-color':'#ffd24a'}});
  });

  // Degrado grazioso: se la BASE VETTORIALE (PMTiles) non e' disponibile (es. online senza il file, che va su R2),
  // MapLibre emette "Bad response code: 404" ad ogni tile. Non e' un errore per l'utente: la batimetria EMODnet e la scena 3D
  // funzionano lo stesso. Sopprimiamo l'errore rosso e mostriamo un avviso soft una sola volta (niente localita'/strade).
  map.on('error', e=>{ const msg=(e&&e.error&&e.error.message)||'';
    if(/pmtiles|capri_ostia|Bad response code:\s*404/i.test(msg)){
      if(!window.MLP._baseWarn){ window.MLP._baseWarn=true;
        const s=document.querySelector('#title small'); if(s) s.innerHTML='carta nautica &middot; <span style="color:#ffd54a">solo batimetria</span> (base non disponibile qui)'; }
      return; }
    showErr('MapLibre: '+(msg||'errore sorgente/tile')); });
  map.on('idle', ()=>{ window.MLP.ready = true; });
} catch(e){ showErr('INIT: '+e.message); }
</script>
<script>if('serviceWorker' in navigator){addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
</body>
