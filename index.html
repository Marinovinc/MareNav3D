<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MareNav3D">
<meta name="theme-color" content="#06121f">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<title>MareNav3D — carta nautica</title>
<style>
  :root{--bg:#06121f;--panel:rgba(10,22,38,.94);--line:#1f3650;--txt:#dfeaf5;--accent:#16e0ff;--green:#39ff7a;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);overflow:hidden;
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;-webkit-text-size-adjust:100%;overscroll-behavior:none}
  #map{position:absolute;inset:0;background:#0a1a2e}
  #zone{position:absolute;inset:0;display:none;background:#06121f;z-index:1100}
  .hud{position:fixed;z-index:1000;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    box-shadow:0 4px 16px rgba(0,0,0,.5)}
  #title{top:8px;left:50%;transform:translateX(-50%);padding:6px 13px;font-weight:700;font-size:14px;color:#fff}
  #title small{font-weight:400;color:#8fb0cc;font-size:10px}
  #nav{top:8px;right:8px;padding:8px 11px;width:min(60vw,210px);font-size:12px;line-height:1.5;display:none}
  #nav h4{margin:0 0 4px;color:var(--accent);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  #nav .row{display:flex;justify-content:space-between;gap:8px}
  #nav .k{color:#8fb0cc}#nav .v{font-family:ui-monospace,monospace;color:#fff}
  #tools{bottom:10px;left:50%;transform:translateX(-50%);padding:6px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:96vw}
  #tools button{padding:8px 11px;border-radius:8px;border:1px solid var(--line);background:#11243c;color:var(--txt);font-size:12.5px;cursor:pointer;-webkit-tap-highlight-color:transparent}
  #tools button.active{background:#1e3a63;border-color:var(--accent);color:#fff}
  #readout{bottom:54px;left:50%;transform:translateX(-50%);padding:6px 12px;font-size:12.5px;display:none;max-width:92vw;text-align:center}
  #readout a{color:var(--accent);cursor:pointer}
  #layerBtn{top:8px;left:8px;padding:8px 10px;font-size:12px;cursor:pointer;color:var(--txt)}
  #btnBack3d{top:8px;left:8px;padding:8px 12px;font-weight:600;font-size:13px;color:var(--txt);cursor:pointer;display:none;z-index:1001}
  #zoneZoom{display:none;right:8px;bottom:54px;flex-direction:column;padding:5px;gap:5px}
  #zoneZoom button{width:40px;height:36px;border-radius:8px;border:1px solid var(--line);background:#11243c;color:#fff;font-size:19px;font-weight:700;cursor:pointer}
  #loading{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:2000;background:rgba(6,18,31,.8);color:var(--accent);font-size:15px;flex-direction:column;gap:10px}
  #loading button{padding:8px 14px;border-radius:8px;border:1px solid var(--line);background:#11243c;color:var(--txt);cursor:pointer}
  .leaflet-container{background:#0a1a2e}
  .leaflet-control-attribution{font-size:9px}
  .depthpop{font-family:ui-monospace,monospace;font-size:13px}
  #catchInput{display:none;left:50%;top:42%;transform:translate(-50%,-50%);padding:13px 15px;width:min(82vw,280px);z-index:1500}
  #catchInput .t{font-size:12px;color:var(--accent);margin-bottom:6px;font-weight:600}
  #catchInput input{width:100%;padding:9px;border-radius:7px;border:1px solid var(--line);background:#0e1b30;color:#fff;font-size:15px}
  #catchInput .act{display:flex;gap:7px;margin-top:8px}
  #catchInput .act button{flex:1;padding:9px;border-radius:7px;border:1px solid var(--line);cursor:pointer;font-size:13px;font-weight:600}
  #catchSave{background:var(--accent);color:#062535;border-color:var(--accent)}#catchCancel{background:#11243c;color:var(--txt)}
  #inputPanel,#routesPanel{display:none;left:50%;top:42%;transform:translate(-50%,-50%);padding:13px 15px;width:min(84vw,300px);z-index:1500}
  #inputPanel .t,#routesPanel .t{font-size:12px;color:var(--accent);margin-bottom:7px;font-weight:600}
  #inputPanel input{width:100%;padding:9px;border-radius:7px;border:1px solid var(--line);background:#0e1b30;color:#fff;font-size:15px}
  #inputPanel .act,#routesPanel .act{display:flex;gap:7px;margin-top:9px}
  #inputPanel .act button,#routesPanel .act button{flex:1;padding:9px;border-radius:7px;border:1px solid var(--line);cursor:pointer;font-size:12.5px;font-weight:600;background:#11243c;color:var(--txt)}
  #inputOk,#rtSave{background:var(--accent)!important;color:#062535!important;border-color:var(--accent)!important}
  #routesList{max-height:42vh;overflow:auto}
</style>
</head>
<body>
<div id="map"></div>
<div id="zone"></div>

<div id="title" class="hud">MareNav3D<br><small>carta nautica &middot; batimetria + Fondali 3D</small></div>
<button id="btnBack3d" class="hud">&#8592; Carta</button>

<div id="nav" class="hud">
  <h4>Navigazione</h4>
  <div class="row"><span class="k">Lat</span><span class="v" id="nLat">—</span></div>
  <div class="row"><span class="k">Lon</span><span class="v" id="nLon">—</span></div>
  <div class="row"><span class="k">Fondale</span><span class="v" id="nDep">—</span></div>
  <div class="row"><span class="k">Vel.</span><span class="v" id="nSpd">—</span></div>
  <div class="row"><span class="k">Rotta</span><span class="v" id="nCog">—</span></div>
  <div class="row"><span class="k">&rarr; WP</span><span class="v" id="nWp">—</span></div>
  <div class="row"><span class="k">Bussola</span><span class="v" id="nBrg">—</span></div>
  <div class="row"><span class="k">ETA</span><span class="v" id="nEta">—</span></div>
</div>

<div id="zoneZoom" class="hud"><button id="zZoomIn">+</button><button id="zZoomOut">&minus;</button></div>
<div id="readout" class="hud"></div>
<div id="catchInput" class="hud">
  <div class="t">Registra cattura</div>
  <input id="catchNote" type="text" placeholder="specie / peso (opzionale)" maxlength="40" autocomplete="off">
  <div class="act"><button id="catchCancel">Annulla</button><button id="catchSave">Salva</button></div>
</div>
<div id="inputPanel" class="hud">
  <div class="t" id="inputTitle"></div>
  <input id="inputField" type="text" maxlength="30" autocomplete="off">
  <div class="act"><button id="inputCancel">Annulla</button><button id="inputOk">OK</button></div>
</div>
<div id="routesPanel" class="hud">
  <div class="t">Rotte salvate</div>
  <div id="routesList"></div>
  <div class="act"><button id="rtNew">Nuova</button><button id="rtSave">Salva attuale</button><button id="rtClose">Chiudi</button></div>
</div>

<div id="tools" class="hud">
  <button id="btnGps">GPS</button>
  <button id="btnRuler">Righello</button>
  <button id="btnWp">Waypoint</button>
  <button id="btnRoutes">Rotte</button>
  <button id="btnTrack">Traccia</button>
  <button id="btnCatch">Cattura</button>
  <button id="btn3d">Fondali 3D</button>
</div>

<div id="loading"><div id="loadtxt">Carico…</div><button id="loadCancel" style="display:none">Annulla</button></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
<script>
"use strict";
const $=id=>document.getElementById(id);
const NATIVE_RES=0.0010416666666666667;
const WMS='https://ows.emodnet-bathymetry.eu/wms';
const WCS_URL='https://ows.emodnet-bathymetry.eu/wcs?service=WCS&version=2.0.1&request=GetCoverage&coverageId=emodnet__mean&format=image/tiff';

// ---------- CARTA 2D (Leaflet) ----------
const map=L.map('map',{zoomControl:true,attributionControl:true,worldCopyJump:true}).setView([40.0,13.0],6);
L.control.zoom({position:'topright'}).addTo(map); map.zoomControl.remove(); // usa quello a destra
L.control.zoom({position:'bottomright'}).addTo(map);
// solo dati aperti: base costa CARTO + batimetria EMODnet (attiva solo da minZoom in su, dove rende bene) + segnalamenti OpenSeaMap
const base=L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  {maxZoom:18, attribution:'&copy; OpenStreetMap, &copy; CARTO'}).addTo(map);
const EMOD_MINZOOM=0, EMOD_MAXNATIVE=11;
// EMODnet via tile XYZ CDN (pre-renderizzati, affidabili - niente rate-limit/mattonelle del WMS)
const bathy=L.tileLayer('https://tiles.emodnet-bathymetry.eu/2020/baselayer/web_mercator/{z}/{x}/{y}.png',
  {minZoom:EMOD_MINZOOM, maxZoom:18, maxNativeZoom:EMOD_MAXNATIVE, opacity:0.85, attribution:'&copy; EMODnet Bathymetry'}).addTo(map);
const seamark=L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png',{maxZoom:18,attribution:'&copy; OpenSeaMap'}).addTo(map);
L.control.layers({'Costa (CARTO)':base},
  {'Fondali EMODnet':bathy,'Segnalamenti (OpenSeaMap)':seamark},{position:'topleft',collapsed:true}).addTo(map);
// avviso quando lo zoom e' troppo basso per i fondali EMODnet
function emodHint(){ if(map.getZoom()<EMOD_MINZOOM) readout('Fondali EMODnet: <b>zooma di più</b> (livello '+EMOD_MINZOOM+'+) per vederli'); }
map.on('zoomend', ()=>{ if(map.getZoom()<EMOD_MINZOOM && !mode) emodHint(); });

// ---------- profondità EMODnet (WCS, in un punto) ----------
function fetchTO(url,ms){const ctl=new AbortController();const t=setTimeout(()=>ctl.abort(),ms);return fetch(url,{signal:ctl.signal}).finally(()=>clearTimeout(t));}
async function fetchTile(latS,latN,lonW,lonE,maxpx){
  const sf=Math.min(maxpx/((lonE-lonW)/NATIVE_RES), maxpx/((latN-latS)/NATIVE_RES),1).toFixed(4);
  const url=WCS_URL+'&subset=Lat('+latS+','+latN+')&subset=Long('+lonW+','+lonE+')&scalefactor='+sf;
  const buf=await(await fetchTO(url,30000)).arrayBuffer();
  const tiff=await GeoTIFF.fromArrayBuffer(buf);const img=await tiff.getImage();
  return {w:img.getWidth(),h:img.getHeight(),data:(await img.readRasters())[0]};
}
async function depthAt(lat,lon){
  try{ const t=await fetchTile(lat-0.03,lat+0.03,lon-0.03,lon+0.03,8);
    const v=t.data[Math.floor(t.h/2)*t.w+Math.floor(t.w/2)];
    return (v>-12000&&v<200)?v:null; }catch(e){ return null; }
}

// ---------- strumenti ----------
let mode=null, pendingCatch=null, routePts=[], catches=[], rulerPts=[], rulerLine=null, routeLine=null, routeLayer=L.layerGroup().addTo(map), catchLayer=L.layerGroup().addTo(map), rulerLayer=L.layerGroup().addTo(map);
function readout(html){ $('readout').style.display=html?'block':'none'; if(html)$('readout').innerHTML=html; }
function nm(a,b){const R=3440.065,d=Math.PI/180,dLat=(b[0]-a[0])*d,dLon=(b[1]-a[1])*d;
  const s=Math.sin(dLat/2)**2+Math.cos(a[0]*d)*Math.cos(b[0]*d)*Math.sin(dLon/2)**2;return R*2*Math.asin(Math.sqrt(s));}
function totNm(p){let t=0;for(let i=1;i<p.length;i++)t+=nm([p[i-1].lat,p[i-1].lng],[p[i].lat,p[i].lng]);return t;}
function persist(){ localStorage.setItem('mnav_route',JSON.stringify(routePts)); localStorage.setItem('mnav_catches',JSON.stringify(catches)); }
function drawRoute(){
  routeLayer.clearLayers(); routeLine=null;
  if(routePts.length>=2) routeLine=L.polyline(routePts.map(p=>[p.lat,p.lng]),{color:'#ffd54a',weight:3}).addTo(routeLayer);
  routePts.forEach((p,i)=>{
    const m=L.marker([p.lat,p.lng],{draggable:true, keyboard:false, icon:L.divIcon({className:'',
      html:'<div style="width:18px;height:18px;border-radius:50%;background:#ffd54a;border:2px solid #3a2a00;box-shadow:0 0 3px #000;color:#3a2a00;font:700 11px/18px system-ui;text-align:center">'+(i+1)+'</div>',iconSize:[18,18],iconAnchor:[9,9]})}).addTo(routeLayer);
    m.on('drag', e=>{ const ll=e.target.getLatLng(); routePts[i]={lat:ll.lat,lng:ll.lng}; if(routeLine) routeLine.setLatLngs(routePts.map(q=>[q.lat,q.lng])); });
    m.on('dragend', ()=>{ persist(); drawRoute(); if(mode==='wp') readout('Rotta: <b>'+routePts.length+' WP</b>, '+totNm(routePts).toFixed(2)+' nm'); });
    m.on('click', ev=>{ L.DomEvent.stop(ev);
      L.popup({offset:[0,-7]}).setLatLng(m.getLatLng())
        .setContent('<button id="rmWp" style="padding:6px 10px;border:1px solid #2c416c;background:#11243c;color:#fff;border-radius:7px;cursor:pointer;font-size:12px">Elimina waypoint</button>').openOn(map);
      setTimeout(()=>{ const btn=document.getElementById('rmWp'); if(btn) btn.onclick=()=>{ routePts.splice(i,1); map.closePopup(); persist(); drawRoute(); if(mode==='wp') readout('Rotta: <b>'+routePts.length+' WP</b>, '+totNm(routePts).toFixed(2)+' nm'); }; },0);
    });
  });
}
function drawCatches(){ catchLayer.clearLayers();
  catches.forEach(c=>L.marker([c.lat,c.lng]).addTo(catchLayer).bindPopup('🎣 '+(c.note||'cattura'))); }
function rulerTotal(){ let t=0; for(let i=1;i<rulerPts.length;i++) t+=nm([rulerPts[i-1].lat,rulerPts[i-1].lng],[rulerPts[i].lat,rulerPts[i].lng]); return t; }
function updateRulerReadout(){ if(mode!=='ruler') return;
  if(rulerPts.length<2){ readout(rulerPts.length? 'Righello: tocca per aggiungere punti &middot; <a id="clrRul">cancella</a>' : 'Righello: tocca il <b>primo</b> punto'); }
  else { const t=rulerTotal(); readout('Righello: <b>'+t.toFixed(2)+' nm</b> ('+(t*1.852).toFixed(2)+' km) &middot; '+rulerPts.length+' punti &middot; trascina o tocca un punto &middot; <a id="clrRul">cancella</a>'); }
  const c=document.getElementById('clrRul'); if(c) c.onclick=()=>{ rulerPts=[]; redrawRuler(); };
}
function redrawRuler(){
  rulerLayer.clearLayers(); rulerLine=null;
  if(rulerPts.length>=2) rulerLine=L.polyline(rulerPts.map(p=>[p.lat,p.lng]),{color:'#ff3b6b',weight:3,dashArray:'6 5'}).addTo(rulerLayer);
  rulerPts.forEach((p,i)=>{
    const m=L.marker([p.lat,p.lng],{draggable:true, keyboard:false, icon:L.divIcon({className:'',
      html:'<div style="width:15px;height:15px;border-radius:50%;background:#ff3b6b;border:2px solid #fff;box-shadow:0 0 3px #000"></div>',iconSize:[15,15],iconAnchor:[8,8]})}).addTo(rulerLayer);
    m.on('drag', e=>{ const ll=e.target.getLatLng(); rulerPts[i]={lat:ll.lat,lng:ll.lng};
      if(rulerLine) rulerLine.setLatLngs(rulerPts.map(q=>[q.lat,q.lng])); updateRulerReadout(); });
    m.on('dragend', ()=> redrawRuler());
    m.on('click', ev=>{ L.DomEvent.stop(ev);
      L.popup({offset:[0,-6]}).setLatLng(m.getLatLng())
        .setContent('<button id="rmRpt" style="padding:6px 10px;border:1px solid #2c416c;background:#11243c;color:#fff;border-radius:7px;cursor:pointer;font-size:12px">Elimina punto</button>').openOn(map);
      setTimeout(()=>{ const btn=document.getElementById('rmRpt'); if(btn) btn.onclick=()=>{ rulerPts.splice(i,1); map.closePopup(); redrawRuler(); }; },0);
    });
  });
  updateRulerReadout();
}
function loadSaved(){ routePts=JSON.parse(localStorage.getItem('mnav_route')||'[]'); catches=JSON.parse(localStorage.getItem('mnav_catches')||'[]'); drawRoute(); drawCatches(); loadTrack(); }

function setMode(m){ mode=(mode===m)?null:m;
  [['ruler','btnRuler'],['wp','btnWp'],['catch','btnCatch']].forEach(([k,id])=>$(id).classList.toggle('active',mode===k));
  map.getContainer().style.cursor = mode?'crosshair':'';
  if(mode==='ruler'){ rulerPts=[]; redrawRuler(); }
  else if(mode==='wp') readout('Waypoint: tocca per aggiungere punti alla rotta');
  else if(mode==='catch') readout('Cattura: tocca il punto della cattura');
  else readout('');
}
$('btnRuler').onclick=()=>setMode('ruler');
$('btnWp').onclick=()=>setMode('wp');
$('btnCatch').onclick=()=>setMode('catch');
$('catchSave').onclick=()=>{ if(pendingCatch){ catches.push({lat:pendingCatch.lat,lng:pendingCatch.lng,note:($('catchNote').value||'').slice(0,40),t:Date.now()}); drawCatches(); persist(); readout('Cattura registrata ('+catches.length+')'); } $('catchInput').style.display='none'; pendingCatch=null; };
$('catchCancel').onclick=()=>{ $('catchInput').style.display='none'; pendingCatch=null; };

// input non bloccante generico
let inputCb=null;
function askInput(title, placeholder, value, cb){ $('inputTitle').textContent=title; $('inputField').placeholder=placeholder||''; $('inputField').value=value||''; inputCb=cb; $('inputPanel').style.display='block'; try{$('inputField').focus();}catch(_){} }
$('inputOk').onclick=()=>{ const v=$('inputField').value; $('inputPanel').style.display='none'; const cb=inputCb; inputCb=null; if(cb) cb(v); };
$('inputCancel').onclick=()=>{ $('inputPanel').style.display='none'; inputCb=null; };

// rotte multiple con nome
function savedRoutes(){ try{ return JSON.parse(localStorage.getItem('mnav_routes')||'[]'); }catch(e){ return []; } }
function setSavedRoutes(a){ localStorage.setItem('mnav_routes', JSON.stringify(a)); }
function renderRoutesList(){
  const list=savedRoutes(), wrap=$('routesList'); wrap.innerHTML='';
  if(!list.length){ wrap.innerHTML='<div style="color:#8fb0cc;font-size:12px">Nessuna rotta salvata</div>'; return; }
  list.forEach(r=>{ const row=document.createElement('div'); row.style.cssText='display:flex;gap:6px;align-items:center;margin:5px 0';
    const open=document.createElement('button'); open.textContent=r.name+' ('+totNm(r.pts).toFixed(1)+' nm, '+r.pts.length+' wp)';
    open.style.cssText='flex:1;text-align:left;padding:7px 9px;border-radius:6px;border:1px solid #2c416c;background:#11243c;color:#dfeaf5;font-size:12px;cursor:pointer';
    open.onclick=()=>{ routePts=r.pts.map(p=>({lat:p.lat,lng:p.lng})); nextWpIdx=0; drawRoute(); persist(); $('routesPanel').style.display='none';
      readout('Rotta caricata: '+r.name+' ('+totNm(routePts).toFixed(2)+' nm)'); };
    const del=document.createElement('button'); del.textContent='✗';
    del.style.cssText='padding:7px 10px;border-radius:6px;border:1px solid #2c416c;background:#11243c;color:#ff6b6b;cursor:pointer';
    del.onclick=()=>{ setSavedRoutes(savedRoutes().filter(x=>x.id!==r.id)); renderRoutesList(); };
    row.appendChild(open); row.appendChild(del); wrap.appendChild(row); });
}
$('btnRoutes').onclick=()=>{ const pn=$('routesPanel'); const show=pn.style.display!=='block'; pn.style.display=show?'block':'none'; if(show) renderRoutesList(); };
$('rtClose').onclick=()=>{ $('routesPanel').style.display='none'; };
$('rtNew').onclick=()=>{ routePts=[]; drawRoute(); persist(); $('routesPanel').style.display='none'; if(mode!=='wp') setMode('wp'); readout('Nuova rotta: tocca per aggiungere waypoint'); };
$('rtSave').onclick=()=>{ if(!routePts.length){ readout('Nessun waypoint da salvare'); return; }
  $('routesPanel').style.display='none';
  askInput('Salva rotta','nome rotta','Rotta '+(savedRoutes().length+1), name=>{ name=(name||'Rotta').slice(0,30);
    const list=savedRoutes(); list.unshift({id:'r'+Date.now(), name:name, pts:routePts.map(p=>({lat:p.lat,lng:p.lng}))}); setSavedRoutes(list);
    readout('Rotta salvata: '+name); }); };

map.on('click', async e=>{
  const lat=e.latlng.lat, lon=e.latlng.lng;
  if(mode==='ruler'){
    rulerPts.push({lat,lng:lon}); redrawRuler();
  } else if(mode==='wp'){
    routePts.push({lat,lng:lon}); drawRoute(); persist();
    readout('Rotta: <b>'+routePts.length+' WP</b>, '+totNm(routePts).toFixed(2)+' nm &middot; <a id="undoWp">annulla</a> &middot; <a id="clrWp">cancella</a>');
    $('undoWp').onclick=()=>{routePts.pop();drawRoute();persist();readout('Rotta: <b>'+routePts.length+' WP</b>, '+totNm(routePts).toFixed(2)+' nm');};
    $('clrWp').onclick=()=>{routePts=[];drawRoute();persist();readout('Rotta cancellata');};
  } else if(mode==='catch'){
    pendingCatch={lat:lat,lng:lon}; $('catchNote').value=''; $('catchInput').style.display='block';
    try{ $('catchNote').focus(); }catch(_){}
  } else {
    // default: profondità al tocco
    const pop=L.popup({className:'depthpop'}).setLatLng(e.latlng).setContent('Leggo il fondale…').openOn(map);
    const d=await depthAt(lat,lon);
    pop.setContent(d==null?('Nessun dato qui<br><small>'+lat.toFixed(4)+', '+lon.toFixed(4)+'</small>')
      :('<b>'+Math.abs(Math.round(d))+' m</b><br><small>'+lat.toFixed(4)+', '+lon.toFixed(4)+'</small>'));
  }
});

// ---------- GPS + navigazione + traccia ----------
let watchId=null, boatM=null, accM=null, depTimer=0, nextWpIdx=0, track=[], trackLine=null, recording=false;
function bearing(la1,lo1,la2,lo2){ const d=Math.PI/180,y=Math.sin((lo2-lo1)*d)*Math.cos(la2*d),
  x=Math.cos(la1*d)*Math.sin(la2*d)-Math.sin(la1*d)*Math.cos(la2*d)*Math.cos((lo2-lo1)*d); return (Math.atan2(y,x)*180/Math.PI+360)%360; }
function fmtEta(s){ if(!isFinite(s)||s<0) return '—'; s=Math.round(s); const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return h? (h+'h'+String(m).padStart(2,'0')) : (m+'m'+String(ss).padStart(2,'0')+'s'); }
function boatIcon(hd){ const has=(hd!=null&&!isNaN(hd));
  return L.divIcon({className:'', iconSize:[24,24], iconAnchor:[12,12],
    html: has ? '<div style="transform:rotate('+hd+'deg)"><svg width="24" height="24" viewBox="0 0 24 24"><polygon points="12,1 19,21 12,16 5,21" fill="#39ff7a" stroke="#063" stroke-width="1.5"/></svg></div>'
              : '<div style="width:15px;height:15px;border-radius:50%;background:#39ff7a;border:2px solid #063;margin:4px"></div>' }); }
function loadTrack(){ try{ track=JSON.parse(localStorage.getItem('mnav_track')||'[]'); }catch(e){ track=[]; }
  if(track.length>1){ trackLine=L.polyline(track,{color:'#16e0ff',weight:3,opacity:.85}).addTo(map); } }
function toggleTrack(){ recording=!recording; $('btnTrack').classList.toggle('active',recording);
  if(recording){ if(watchId==null) startGps(); readout('Registrazione traccia avviata'); } else readout('Registrazione fermata'); }
function clearTrack(){ track=[]; if(trackLine){ map.removeLayer(trackLine); trackLine=null; } localStorage.removeItem('mnav_track'); readout('Traccia cancellata'); }
$('btnTrack').onclick=()=>toggleTrack();
function onPos(p){
  const {latitude:lat,longitude:lon,accuracy,speed,heading}=p.coords;
  $('nLat').textContent=lat.toFixed(5); $('nLon').textContent=lon.toFixed(5);
  $('nSpd').textContent=(speed!=null&&!isNaN(speed))?((speed*1.94384).toFixed(1)+' kn'):'—';
  $('nCog').textContent=(heading!=null&&!isNaN(heading))?(Math.round(heading)+'°'):'—';
  if(!boatM){ boatM=L.marker([lat,lon],{icon:boatIcon(heading),interactive:false}).addTo(map);
    accM=L.circle([lat,lon],{radius:accuracy||30,color:'#39ff7a',weight:1,fillOpacity:.08}).addTo(map);
    map.setView([lat,lon], Math.max(map.getZoom(),11)); }
  else { boatM.setLatLng([lat,lon]); boatM.setIcon(boatIcon(heading)); accM.setLatLng([lat,lon]).setRadius(accuracy||30); }
  // navigazione al prossimo waypoint
  if(routePts.length){
    if(nextWpIdx>=routePts.length) nextWpIdx=routePts.length-1;
    let tgt=routePts[nextWpIdx], dnm=nm([lat,lon],[tgt.lat,tgt.lng]);
    if(dnm*1852<60 && nextWpIdx<routePts.length-1){ nextWpIdx++; tgt=routePts[nextWpIdx]; dnm=nm([lat,lon],[tgt.lat,tgt.lng]); }
    $('nWp').textContent='#'+(nextWpIdx+1)+' '+dnm.toFixed(2)+' nm';
    $('nBrg').textContent=Math.round(bearing(lat,lon,tgt.lat,tgt.lng))+'°';
    const sp=(speed!=null&&!isNaN(speed)&&speed>0.2)?speed:null;
    $('nEta').textContent=sp?fmtEta(dnm*1852/sp):'—';
  } else { $('nWp').textContent='—'; $('nBrg').textContent='—'; $('nEta').textContent='—'; }
  // registrazione traccia reale
  if(recording){ track.push([lat,lon]); if(!trackLine) trackLine=L.polyline(track,{color:'#16e0ff',weight:3,opacity:.85}).addTo(map); else trackLine.setLatLngs(track);
    localStorage.setItem('mnav_track',JSON.stringify(track));
    let td=0; for(let i=1;i<track.length;i++) td+=nm(track[i-1],track[i]);
    readout('Traccia: <b>'+td.toFixed(2)+' nm</b> &middot; <a id="stopTrk">stop</a> &middot; <a id="clrTrk">cancella</a>');
    const s=document.getElementById('stopTrk'); if(s) s.onclick=()=>toggleTrack();
    const c=document.getElementById('clrTrk'); if(c) c.onclick=()=>clearTrack();
  }
  if(Date.now()-depTimer>8000){ depTimer=Date.now(); depthAt(lat,lon).then(d=>{ $('nDep').textContent=(d==null?'—':Math.abs(Math.round(d))+' m'); }); }
}
function startGps(){ if(!navigator.geolocation){alert('GPS non disponibile');return;}
  nextWpIdx=0;
  watchId=navigator.geolocation.watchPosition(onPos,e=>readout('GPS: '+(e.message||'errore')),{enableHighAccuracy:true,maximumAge:1000,timeout:15000});
  $('btnGps').classList.add('active'); $('nav').style.display='block'; }
function stopGps(){ if(watchId!=null){navigator.geolocation.clearWatch(watchId);watchId=null;}
  $('btnGps').classList.remove('active'); if(boatM){map.removeLayer(boatM);map.removeLayer(accM);boatM=null;} $('nav').style.display='none'; }
$('btnGps').onclick=()=>{ watchId==null?startGps():stopGps(); };

// ---------- VISTA 3D dell'area inquadrata (riuso Plotly) ----------
async function fetchGridSingle(latS,latN,lonW,lonE){ const t=await fetchTile(latS,latN,lonW,lonE,300);
  return gridFromRaster(t.data,t.w,t.h,{latS,latN,lonW,lonE}); }
async function fetchGridTiled(latS,latN,lonW,lonE){
  const dlon=lonE-lonW,dlat=latN-latS,res=0.04,cols=Math.min(420,Math.round(dlon/res)),rows=Math.min(420,Math.round(dlat/res));
  const band=new Float32Array(rows*cols).fill(NaN); const TILE=3.0,nLon=Math.ceil(dlon/TILE),nLat=Math.ceil(dlat/TILE),tiles=[];
  for(let a=0;a<nLat;a++)for(let o=0;o<nLon;o++){ const tS=latS+a*dlat/nLat,tN=latS+(a+1)*dlat/nLat,tW=lonW+o*dlon/nLon,tE=lonW+(o+1)*dlon/nLon;
    try{const t=await fetchTile(tS,tN,tW,tE,200);tiles.push({tS,tN,tW,tE,w:t.w,h:t.h,data:t.data});}catch(e){} }
  for(let i=0;i<rows;i++){const lat=latN-i*(dlat/(rows-1));for(let j=0;j<cols;j++){const lon=lonW+j*(dlon/(cols-1));
    for(const t of tiles){ if(lat<=t.tN&&lat>=t.tS&&lon>=t.tW&&lon<=t.tE){
      const ti=Math.max(0,Math.min(t.h-1,Math.round((t.tN-lat)/((t.tN-t.tS)/(t.h-1)))));
      const tj=Math.max(0,Math.min(t.w-1,Math.round((lon-t.tW)/((t.tE-t.tW)/(t.w-1)))));
      const v=t.data[ti*t.w+tj];band[i*cols+j]=(v>-12000&&v<200)?v:NaN;break; } } } }
  return gridFromRaster(band,cols,rows,{latS,latN,lonW,lonE});
}
function gridFromRaster(band,cols,rows,bb){ const lats=[],lons=[],zz=[];
  const dlat=(bb.latN-bb.latS)/(rows-1),dlon=(bb.lonE-bb.lonW)/(cols-1);
  for(let i=0;i<rows;i++)lats.push(+(bb.latN-i*dlat).toFixed(5));
  for(let j=0;j<cols;j++)lons.push(+(bb.lonW+j*dlon).toFixed(5));
  for(let i=0;i<rows;i++){const row=new Array(cols);for(let j=0;j<cols;j++){const v=band[i*cols+j];row[j]=(v>-12000&&v<200)?v:null;}zz.push(row);}
  return {lats,lons,zz,rows,cols,bb};
}
$('btn3d').onclick=async()=>{
  let b=map.getBounds(); let latS=b.getSouth(),latN=b.getNorth(),lonW=b.getWest(),lonE=b.getEast();
  // limita l'area 3D a ~3° centrati (per velocità) se la vista e' troppo ampia
  const cx=(lonW+lonE)/2, cy=(latS+latN)/2, MAX=3.0;
  if(lonE-lonW>MAX){ lonW=cx-MAX/2; lonE=cx+MAX/2; } if(latN-latS>MAX){ latS=cy-MAX/2; latN=cy+MAX/2; }
  latS=Math.max(30.2,latS);latN=Math.min(46,latN);lonW=Math.max(-6,lonW);lonE=Math.min(36.5,lonE);
  $('loadtxt').textContent='Carico il 3D dei fondali…'; $('loading').style.display='flex';
  try{
    const area=(lonE-lonW)*(latN-latS);
    const g= area<=12 ? await fetchGridSingle(latS,latN,lonW,lonE) : await fetchGridTiled(latS,latN,lonW,lonE);
    let sea=0; g.zz.forEach(r=>r.forEach(v=>{if(v!=null&&v<0)sea++;}));
    if(sea<20){ $('loading').style.display='none'; alert('Area senza fondali. Inquadra del mare.'); return; }
    await show3D(g);
  }catch(e){ $('loading').style.display='none'; alert('3D non riuscito: '+e.message); }
};
function gridDepth(g, lat, lon){
  if(lat>g.bb.latN||lat<g.bb.latS||lon<g.bb.lonW||lon>g.bb.lonE) return null;
  const i=Math.round((g.bb.latN-lat)/((g.bb.latN-g.bb.latS)/(g.rows-1)));
  const j=Math.round((lon-g.bb.lonW)/((g.bb.lonE-g.bb.lonW)/(g.cols-1)));
  if(i<0||i>=g.rows||j<0||j>=g.cols) return null;
  return g.zz[i][j];
}
async function show3D(g){
  const surf={type:'surface',x:g.lons,y:g.lats,z:g.zz,
    colorscale:[[0,'rgb(40,135,161)'],[0.1667,'rgb(121,167,172)'],[0.3333,'rgb(181,200,184)'],[0.5,'rgb(237,234,194)'],[0.6667,'rgb(214,189,141)'],[0.8333,'rgb(189,146,90)'],[1,'rgb(161,105,40)']],
    colorbar:{title:{text:'quota m'},x:1,thickness:10}};
  // rotta + barca drappeggiate sul fondale 3D (come ROTTA_A_3D)
  const extra=[];
  if(routePts.length){
    const rx=[],ry=[],rz=[],rt=[];
    routePts.forEach((p,i)=>{ const d=gridDepth(g,p.lat,p.lng); if(d!=null){ rx.push(p.lng); ry.push(p.lat); rz.push(d+15); rt.push(String(i+1)); } });
    if(rx.length) extra.push({type:'scatter3d',x:rx,y:ry,z:rz,mode:'lines+markers+text',
      line:{color:'#ffd54a',width:6},marker:{size:4,color:'#ffd54a'},text:rt,textposition:'top center',textfont:{color:'#ffe08a',size:11},name:'rotta'});
  }
  if(boatM){ const bll=boatM.getLatLng(), bd=gridDepth(g,bll.lat,bll.lng);
    if(bd!=null){ const SURF=20;
      // beam ecoscandaglio (barca in superficie -> fondo)
      extra.push({type:'scatter3d',x:[bll.lng,bll.lng],y:[bll.lat,bll.lat],z:[SURF,bd],mode:'lines',
        line:{color:'#16e0ff',width:5},opacity:0.9,name:'beam ecoscandaglio'});
      // eco sul fondo (profondita)
      extra.push({type:'scatter3d',x:[bll.lng],y:[bll.lat],z:[bd],mode:'markers+text',
        marker:{size:5,color:'#16e0ff',line:{color:'#063',width:1}},text:[Math.abs(Math.round(bd))+' m'],textposition:'bottom center',textfont:{color:'#8df0ff',size:10},name:'eco fondo'});
      // barca in superficie
      extra.push({type:'scatter3d',x:[bll.lng],y:[bll.lat],z:[SURF],mode:'markers+text',
        marker:{size:8,color:'#39ff7a',symbol:'diamond',line:{color:'#063',width:2}},text:['barca'],textposition:'top center',textfont:{color:'#39ff7a',size:11},name:'barca'});
    }
  }
  $('zone').style.display='block'; $('btnBack3d').style.display='block';
  $('zoneZoom').style.display='flex'; $('tools').style.display='none'; $('title').style.display='none';
  await Plotly.newPlot('zone',[surf,...extra],{paper_bgcolor:'#06121f',margin:{l:0,r:0,t:0,b:0},
    scene:{aspectmode:'manual',aspectratio:{x:2,y:2,z:0.9},camera:{eye:{x:1.4,y:-1.6,z:1.0}},
    xaxis:{title:'lon',color:'#7fa0bd'},yaxis:{title:'lat',color:'#7fa0bd'},zaxis:{title:'quota m',color:'#7fa0bd'}}},
    {displayModeBar:false,responsive:true});
  $('loading').style.display='none';
}
$('btnBack3d').onclick=()=>{ $('zone').style.display='none'; $('btnBack3d').style.display='none';
  $('zoneZoom').style.display='none'; $('tools').style.display='flex'; $('title').style.display='block'; };
function zoneZoom(f){ const z=$('zone'); if(!z._fullLayout||!z._fullLayout.scene)return; const c=z._fullLayout.scene.camera.center||{x:0,y:0,z:0}, e=z._fullLayout.scene.camera.eye;
  Plotly.relayout('zone',{'scene.camera.eye':{x:c.x+(e.x-c.x)*f,y:c.y+(e.y-c.y)*f,z:c.z+(e.z-c.z)*f}}); }
$('zZoomIn').onclick=()=>zoneZoom(0.8); $('zZoomOut').onclick=()=>zoneZoom(1.25);

loadSaved();
window.MN={map:map, get mode(){return mode;}, get ruler(){return rulerPts;}, get route(){return routePts;}};   // hook test/automazione
</script>
